<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Blurred cozy room">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2e9dc"/>
      <stop offset="1" stop-color="#e4d5c2"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7a079"/>
      <stop offset="1" stop-color="#a07f59"/>
    </linearGradient>
    <radialGradient id="win" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#fdfbe9"/>
      <stop offset="1" stop-color="#dfeaf0"/>
    </radialGradient>
    <linearGradient id="blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0c2ab"/>
      <stop offset="1" stop-color="#e3a184"/>
    </linearGradient>
    <filter id="soft" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
  </defs>

  <g filter="url(#soft)">
    <rect x="-40" y="-40" width="880" height="560" fill="url(#wall)"/>
    <rect x="-40" y="350" width="880" height="170" fill="url(#floor)"/>

    <rect x="70" y="60" width="230" height="210" rx="10" fill="url(#win)"/>
    <rect x="70" y="60" width="230" height="210" rx="10" fill="none" stroke="#cdbfa6" stroke-width="10"/>
    <line x1="185" y1="60" x2="185" y2="270" stroke="#cdbfa6" stroke-width="8"/>
    <line x1="70" y1="165" x2="300" y2="165" stroke="#cdbfa6" stroke-width="8"/>

    <polygon points="120,270 300,270 470,470 60,470" fill="#fbf3da" opacity="0.55"/>

    <rect x="430" y="140" width="330" height="80" rx="16" fill="#b9c1d8"/>
    <rect x="405" y="205" width="375" height="165" rx="20" fill="#f4efe5"/>
    <rect x="450" y="170" width="120" height="60" rx="16" fill="#fcfaf3"/>
    <rect x="590" y="170" width="120" height="60" rx="16" fill="#fcfaf3"/>
    <rect x="405" y="300" width="375" height="70" rx="14" fill="url(#blanket)"/>

    <rect x="345" y="275" width="60" height="95" rx="8" fill="#b48a60"/>
    <circle cx="375" cy="250" r="30" fill="#ffe7b0"/>

    <ellipse cx="120" cy="430" rx="55" ry="40" fill="#8fae7a"/>
    <ellipse cx="150" cy="400" rx="40" ry="48" fill="#7fa069"/>
    <rect x="105" y="430" width="50" height="45" rx="6" fill="#c98b63"/>
  </g>
</svg>
